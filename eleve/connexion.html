<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
</head>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(180deg,#082f72,#0b4bb3);
            min-height:100vh;
            display:flex;
            padding:20px;
        }

        /* logo*/
        header{
            position:absolute;
            top:20px;
            left:20px;
        }

        header img{
            width:40%;
            height:auto;
        }

        /* affichache de l'illustration*/
        .illustration{
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .illustration img{
            width:110%;
            height:auto;
            margin-left:35%;
            border-radius:25px;
        }
        

        /* bloc de conexion*/
        .bloc{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .module-connexion{
            width:100%;
            max-width:400px;
            background:white;
            border-radius:25px;
            padding:40px 35px;
            margin-left:30%;
        }

        .module-connexion h2{
            text-align:center;
            font-size:34px;
            color:#0f172a;
            margin-bottom:10px;
        }

        .module-connexion p{
            text-align:center;
            color:#64748b;
            margin-bottom:35px;
        }

        /* INPUTS*/
        .input-group{
            position:relative;
            margin-bottom:22px;
        }

        .input-group span{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#94a3b8;
            font-size:18px;
        }

        .input-group input{
            width:100%;
            height:55px;
            border:1px solid #dbe3ef;
            border-radius:14px;
            padding-left:45px;
            font-size:15px;
            background:#f8fafc;
            transition:0.3s;
        }

        .input-group input:focus{
            outline:none;
            border-color:#2563eb;
            background:white;
            box-shadow:0 0 0 4px rgba(37,99,235,0.12);
        }

        
        .forgot-password{
            text-align:right;
            margin-bottom:25px;
            color:#2563eb;
            font-size:14px;
            cursor:pointer;
        }

        .forgot-password:hover{
            text-decoration:underline;
        }

        /*bouton*/
        .login-btn{
            width:100%;
            height:55px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 18px rgba(37,99,235,0.25);
        }
        .pas-de-compte{
            margin-top:25px;
            text-align:center;
            font-size:14px;
            color:#64748b;
        }

        .contact-admin{
            margin-top:8px;
            color:#2563eb;
            font-weight:bold;
            cursor:pointer;
        }

    #message-erreur{
    color:red;
    margin-bottom:15px;
    font-size:14px;
}


        /* RESPONSIVE */
   
    @media(max-width:1200px){

    body{
        flex-direction:column;
        justify-content:center;
        align-items:center;
    }

    .bloc{
        width:100%;
        margin-top:40px;
        margin-right: 25%;
    }

    .module-connexion{
        width:90%;
        max-width:400px;
    }

    .illustration{
        width:100%;
        display:flex;
        justify-content:center;
    }

    .illustration img{
        width:90%;
        margin-top: 20%;
        margin-right: 30%;
        height:auto;
        border-radius:25px;
    }

}

    </style>
</head>

<body>

    <header>
               <img src="images/logo-blanc.png" alt="logo"> 
    </header>

        <div class = "illustration">
            <img src="images/illustration.png" alt="illustration">

        </div>
        <div class="bloc">
            <div class="module-connexion">
                <h2>Bienvenue</h2>
                <p> Connectez-vous à votre compte</p>

               <form action="page-connexion.php" method="POST">
                    <div class="input-group">
                        <span>✉</span>
                       <input type="email" name="email" placeholder="Email" required>

                    </div>
                    <div class="input-group">
                        <span>🔒</span>
                        <input type="password" name="password" placeholder="Mot de passe" required>
                    </div>

                    <div class="forgot-password">
                        Mot de passe oublié ?
                    </div>

                    <p id="message-erreur"></p>
                    
                     <button type="submit" class="login-btn">Connexion</button>
                </form>

                <div class="pas-de-compte">

                    Vous n’avez pas de compte ?

                    <div class="contact-admin">
                        <a href="#"> Contactez l’administrateur</a>
                    </div>

                </div>

            </div>

        </div>

    <script src="script-connexion.js"></script>

</body>
</html>
