<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Planning — SmartCampus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../images/logo-blanc.png" alt="logo">
    </div>
    <nav class="nav">
      <a href="dashboard-prof.html" class="nav-item">🏠 Tableau de bord</a>
      <a href="planning-prof.html"  class="nav-item active">📅 Planning</a>
      <a href="notes-prof.html"     class="nav-item">📝 Notes</a>

    </nav>
    <a href="../connexion.html" class="nav-logout">🚪 Déconnexion</a>
  </aside>

  <main class="main">

    <div class="topbar">
      <div>
        <h1>📅 Mon Planning</h1>
        <p>Consultez votre emploi du temps de la semaine</p>
      </div>
      <div class="topbar-right">
        <button class="btn-outline">◀ Semaine précédente</button>
        <button class="btn-primary">Semaine suivante ▶</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Semaine du -- au --</div>
      <div class="planning-grid">

        <div class="planning-header"></div>
        <div class="planning-header">Lundi</div>
        <div class="planning-header">Mardi</div>
        <div class="planning-header">Mercredi</div>
        <div class="planning-header">Jeudi</div>
        <div class="planning-header">Vendredi</div>

        <div class="planning-heure">08h00</div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>

        <div class="planning-heure">10h00</div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>

        <div class="planning-heure">12h00</div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>

        <div class="planning-heure">14h00</div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>

        <div class="planning-heure">16h00</div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>
        <div class="planning-cell"></div>

      </div>
    </div>

  </main>
</div>
</body>
</html>
