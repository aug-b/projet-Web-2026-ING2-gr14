<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Professeur</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../images/logo-blanc.png" alt="logo">
    </div>
    <nav class="nav">
      <a href="dashboard-prof.html" class="nav-item active">🏠 Tableau de bord</a>
      <a href="planning-prof.html"  class="nav-item">📅 Planning</a>
      <a href="notes-prof.html"     class="nav-item">📝 Notes</a>
      <a href="presences-prof.html" class="nav-item">✅ Présences</a>
      <a href="profil-prof.html"    class="nav-item">👤 Profil</a>
    </nav>
    <a href="../connexion.html" class="nav-logout">🚪 Déconnexion</a>
  </aside>

  <main class="main">

    <div class="topbar">
      <div>
        <h1>Tableau de Bord</h1>
        <p>Bienvenue</p>
      </div>
      <div class="topbar-right">
        <button class="btn-outline">Mon compte</button>
        <button class="btn-primary">Profil</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👨‍🎓</div>
        <div class="stat-value">--</div>
        <div class="stat-label">Étudiants</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-value">--</div>
        <div class="stat-label">Cours</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📝</div>
        <div class="stat-value">--</div>
        <div class="stat-label">Notes à saisir</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value">--</div>
        <div class="stat-label">Présences</div>
      </div>
    </div>

    <div class="content-grid">

      <div class="card">
        <div class="card-title">📅 Prochains cours</div>
        <div class="cours-item">
          <div class="cours-dot"></div>
          <div>
            <div class="cours-name">--</div>
            <div class="cours-info">--</div>
          </div>
        </div>
        <div class="cours-item">
          <div class="cours-dot"></div>
          <div>
            <div class="cours-name">--</div>
            <div class="cours-info">--</div>
          </div>
        </div>
        <div class="cours-item">
          <div class="cours-dot"></div>
          <div>
            <div class="cours-name">--</div>
            <div class="cours-info">--</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📝 Notes à saisir</div>
        <div class="notes-item">
          <span>--</span>
          <button class="btn-primary small">Saisir</button>
        </div>
        <div class="notes-item">
          <span>--</span>
          <button class="btn-primary small">Saisir</button>
        </div>
        <div class="notes-item">
          <span>--</span>
          <button class="btn-primary small">Saisir</button>
        </div>
        <button class="btn-full">Faire l'appel</button>
      </div>

      <div class="card">
        <div class="card-title">🔔 Notifications</div>
        <div class="notif-item">
          <span class="notif-dot green"></span>
          <span>--</span>
        </div>
        <div class="notif-item">
          <span class="notif-dot blue"></span>
          <span>--</span>
        </div>
        <div class="notif-item">
          <span class="notif-dot orange"></span>
          <span>--</span>
        </div>
      </div>

    </div>
  </main>
</div>

</body>
</html>
