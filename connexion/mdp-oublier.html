<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Mot de passe oublié</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(180deg,#082f72,#0b4bb3);
            min-height:100vh;
            display:flex;
            padding:20px;
        }

        /* logo*/
        header{
            position:absolute;
            top:20px;
            left:20px;
        }

        header img{
            width:40%;
            height:auto;
        }

        /* affichache de l'illustration*/
        .illustration{
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .illustration img{
            width:120%;
            height:auto;
            margin-left:35%;
            border-radius:25px;
        }
        

        /* bloc de conexion*/
        .bloc{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .form-card{
            width:100%;
            max-width:470px;
            background:white;
            border-radius:25px;
            padding:40px 35px;
            margin-left:30%;
        }

        .form-card h2{
            text-align:center;
            font-size:34px;
            color:#0f172a;
            margin-bottom:10px;
        }

        .form-card p{
            text-align:center;
            color:#64748b;
            margin-bottom:35px;
        }

       


        /* INPUTS*/
        .input-group{
            position:relative;
            margin-bottom:22px;
        }

        .input-group label{
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .input-group input{
            width: 100%;
            height: 50px;
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            padding: 0 15px;
            font-size: 15px;
            background: #f8fafc;
            transition: 0.3s;
        }

        .input-group input:focus{
            outline: none;
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
        }

        

        

        /*bouton*/
       .btn-g{
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn{
            flex: 1;
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-return{
            background: #e2e8f0;
            color: #1e293b;
        }

        .btn-return:hover{
            background: #cbd5e1;
        }

        .btn-send{
            background: linear-gradient(135deg,#2563eb,#1d4ed8);
            color: white;
        }

        .btn-send:hover{
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(37,99,235,0.25);
        }



        /* RESPONSIVE */
   
    @media(max-width:1300px){

    body{
        flex-direction:column;
        justify-content:center;
        align-items:center;
    }

    .bloc{
        width:100%;
        margin-top:40px;
        margin-right: 25%;
    }

    .module-connexion{
        width:90%;
        max-width:400px;
    }

    .illustration{
        width:100%;
        display:flex;
        justify-content:center;
    }

    .illustration img{
        width:90%;
        margin-top: 20%;
        margin-right: 30%;
        height:auto;
        border-radius:25px;
    }

            

}

    </style>
</head>
